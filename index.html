function downloadGameOverCard() {
  const cardW = 320, cardH = 280, pad = 20, cardR = 16;
  const tmp = document.createElement('canvas');
  tmp.width = cardW + pad * 2;
  tmp.height = cardH + pad * 2;
  const t = tmp.getContext('2d');
  const cx = pad, cy = pad, midX = pad + cardW / 2;

  // 배경
  t.fillStyle = '#0a0a1e';
  t.fillRect(0, 0, tmp.width, tmp.height);

  // 카드
  t.beginPath();
  t.moveTo(cx + cardR, cy);
  t.lineTo(cx + cardW - cardR, cy);
  t.quadraticCurveTo(cx + cardW, cy, cx + cardW, cy + cardR);
  t.lineTo(cx + cardW, cy + cardH - cardR);
  t.quadraticCurveTo(cx + cardW, cy + cardH, cx + cardW - cardR, cy + cardH);
  t.lineTo(cx + cardR, cy + cardH);
  t.quadraticCurveTo(cx, cy + cardH, cx, cy + cardH - cardR);
  t.lineTo(cx, cy + cardR);
  t.quadraticCurveTo(cx, cy, cx + cardR, cy);
  t.closePath();
  t.fillStyle = 'rgba(20, 20, 40, 0.92)';
  t.fill();
  t.strokeStyle = 'rgba(255, 255, 255, 0.15)';
  t.lineWidth = 2;
  t.stroke();

  // GAME OVER
  t.textAlign = 'center';
  t.fillStyle = '#E94560';
  t.font = 'bold 36px sans-serif';
  t.fillText('GAME OVER', midX, cy + 38);

  // 캐릭터 (loadFrames에서 data URL로 변환된 이미지 사용)
  const charType = CHARACTERS[selectedChar].type;
  const cfg = DRAW_CONFIG[charType];
  const F = getFrames();
  let spriteDrawn = false;
  if (F && cfg && F.idle.length > 0) {
    const idleIdx = Math.floor(Date.now() / 200) % F.idle.length;
    const img = F.idle[idleIdx];
    if (img && img.complete && img.naturalWidth > 0) {
      try {
        const aspect = img.naturalWidth / img.naturalHeight;
        const dh = cfg.run.drawH;
        const dw = dh * aspect;
        t.drawImage(img, midX - dw / 2, cy + 52, dw, dh);
        spriteDrawn = true;
      } catch(e) {}
    }
  }

  // 닉네임
  const pName = playerName || CHARACTERS[selectedChar].name;
  const spriteH = cfg ? cfg.run.drawH : 68;
  const nameY = cy + 52 + spriteH + 18;
  t.fillStyle = '#FFF';
  t.font = 'bold 16px sans-serif';
  t.textAlign = 'center';
  t.fillText(pName, midX, nameY);

  // 점수
  t.fillStyle = '#FFF';
  t.font = 'bold 24px monospace';
  t.fillText('Score: ' + score, midX, nameY + 30);

  // 최고기록
  t.fillStyle = '#FFD700';
  t.font = '18px monospace';
  t.fillText('Best: ' + highScore, midX, nameY + 60);

  // NEW RECORD
  if (score >= highScore && score > 0) {
    t.fillStyle = '#FFD700';
    t.font = 'bold 16px sans-serif';
    t.fillText('\u2605 NEW RECORD! \u2605', midX, nameY + 85);
  }

  // 파일명: KEPCORUN_닉네임(점수)_YYYYMMDDHHMMSS
  const now = new Date();
  const ts = now.getFullYear().toString()
    + String(now.getMonth() + 1).padStart(2, '0')
    + String(now.getDate()).padStart(2, '0')
    + String(now.getHours()).padStart(2, '0')
    + String(now.getMinutes()).padStart(2, '0')
    + String(now.getSeconds()).padStart(2, '0');
  const filename = 'KEPCORUN_' + pName + '(' + score + ')_' + ts + '.png';

  // 다운로드 (스프라이트가 캔버스를 taint했으면 재시도)
  let dataUrl;
  try {
    dataUrl = tmp.toDataURL('image/png');
  } catch(e) {
    // taint 발생 — 스프라이트 없이 다시 그리기
    const tmp2 = document.createElement('canvas');
    tmp2.width = tmp.width; tmp2.height = tmp.height;
    const t2 = tmp2.getContext('2d');
    t2.fillStyle = '#0a0a1e';
    t2.fillRect(0, 0, tmp2.width, tmp2.height);
    t2.beginPath();
    t2.moveTo(cx+cardR,cy);t2.lineTo(cx+cardW-cardR,cy);
    t2.quadraticCurveTo(cx+cardW,cy,cx+cardW,cy+cardR);
    t2.lineTo(cx+cardW,cy+cardH-cardR);
    t2.quadraticCurveTo(cx+cardW,cy+cardH,cx+cardW-cardR,cy+cardH);
    t2.lineTo(cx+cardR,cy+cardH);
    t2.quadraticCurveTo(cx,cy+cardH,cx,cy+cardH-cardR);
    t2.lineTo(cx,cy+cardR);
    t2.quadraticCurveTo(cx,cy,cx+cardR,cy);
    t2.closePath();
    t2.fillStyle='rgba(20,20,40,0.92)';t2.fill();
    t2.strokeStyle='rgba(255,255,255,0.15)';t2.lineWidth=2;t2.stroke();
    t2.textAlign='center';
    t2.fillStyle='#E94560';t2.font='bold 36px sans-serif';
    t2.fillText('GAME OVER',midX,cy+38);
    t2.fillStyle='#FFF';t2.font='bold 16px sans-serif';
    t2.fillText(pName,midX,nameY);
    t2.fillStyle='#FFF';t2.font='bold 24px monospace';
    t2.fillText('Score: '+score,midX,nameY+30);
    t2.fillStyle='#FFD700';t2.font='18px monospace';
    t2.fillText('Best: '+highScore,midX,nameY+60);
    if(score>=highScore&&score>0){t2.fillStyle='#FFD700';t2.font='bold 16px sans-serif';t2.fillText('\u2605 NEW RECORD! \u2605',midX,nameY+85);}
    dataUrl = tmp2.toDataURL('image/png');
  }

  const link = document.createElement('a');
  link.download = filename;
  link.href = dataUrl;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  saveNotifyTimer = 120;
}

function drawGameOver() {
  // Animated dim overlay — fades in over first 30 frames
  const overlayAlpha = Math.min(0.6, gameOverTimer * 0.02);
  ctx.fillStyle = `rgba(0, 0, 0, ${overlayAlpha})`;
  ctx.fillRect(0, 0, W, H);

  // Wait for overlay to settle before showing text
  if (gameOverTimer < 25) return;

  const textProgress = Math.min(1, (gameOverTimer - 25) / 20);
  // Ease-out bounce
  const bounce = textProgress < 1
    ? 1 - Math.pow(1 - textProgress, 3) * Math.cos(textProgress * Math.PI * 2) * (1 - textProgress)
    : 1;

  ctx.textAlign = 'center';

  // --- Card background ---
  const cardW = 320;
  const cardH = 280;
  const cardX = (W - cardW) / 2;
  const cardY = (H - cardH) / 2;
  const cardR = 16; // border radius

  ctx.globalAlpha = textProgress;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cardX + cardR, cardY);
  ctx.lineTo(cardX + cardW - cardR, cardY);
  ctx.quadraticCurveTo(cardX + cardW, cardY, cardX + cardW, cardY + cardR);
  ctx.lineTo(cardX + cardW, cardY + cardH - cardR);
  ctx.quadraticCurveTo(cardX + cardW, cardY + cardH, cardX + cardW - cardR, cardY + cardH);
  ctx.lineTo(cardX + cardR, cardY + cardH);
  ctx.quadraticCurveTo(cardX, cardY + cardH, cardX, cardY + cardH - cardR);
  ctx.lineTo(cardX, cardY + cardR);
  ctx.quadraticCurveTo(cardX, cardY, cardX + cardR, cardY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(20, 20, 40, 0.92)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // --- GAME OVER title — drops from above with bounce ---
  const titleY = cardY + 38;
  const titleOffset = (1 - bounce) * -120;
  ctx.globalAlpha = textProgress;
  ctx.fillStyle = '#E94560';
  ctx.font = 'bold 36px sans-serif';
  ctx.fillText('GAME OVER', W / 2, titleY + titleOffset);

  // --- Character idle sprite ---
  const F = getFrames();
  const charType = CHARACTERS[selectedChar].type;
  const cfg = DRAW_CONFIG[charType];
  if (F && cfg && spritesLoaded >= spritesTotal && F.idle.length > 0) {
    const idleIdx = Math.floor(Date.now() / 200) % F.idle.length;
    const img = F.idle[idleIdx];
    if (img && img.complete) {
      const aspect = img.naturalWidth / img.naturalHeight;
      const dh = cfg.run.drawH;
      const dw = dh * aspect;
      const spriteX = W / 2 - dw / 2;
      const spriteY = cardY + 52;
      ctx.globalAlpha = textProgress;
      ctx.drawImage(img, spriteX, spriteY, dw, dh);
    }
  }

  // --- Nickname ---
  const nameY = cardY + 52 + (cfg ? cfg.run.drawH : 68) + 18;
  ctx.globalAlpha = textProgress;
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText(playerName || CHARACTERS[selectedChar].name, W / 2, nameY);

  // --- Score — slides in slightly after title ---
  const scoreY = nameY + 30;
  const scoreProgress = Math.min(1, Math.max(0, (gameOverTimer - 35) / 15));
  if (scoreProgress > 0) {
    ctx.globalAlpha = scoreProgress;
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 24px monospace';
    ctx.fillText('Score: ' + score, W / 2, scoreY);
  }

  // --- Best score — slides in after score ---
  const bestY = scoreY + 30;
  const bestProgress = Math.min(1, Math.max(0, (gameOverTimer - 45) / 15));
  if (bestProgress > 0) {
    ctx.globalAlpha = bestProgress;
    ctx.fillStyle = '#FFD700';
    ctx.font = '18px monospace';
    ctx.fillText('Best: ' + highScore, W / 2, bestY);
  }

  // --- New record ---
  const recordY = bestY + 25;
  if (score >= highScore && score > 0 && bestProgress >= 1) {
    const pulse = 1 + Math.sin(gameOverTimer * 0.1) * 0.15;
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${Math.round(16 * pulse)}px sans-serif`;
    ctx.fillText('\u2605 NEW RECORD! \u2605', W / 2, recordY);
  }

  // --- Restart instruction — only after all text is shown ---
  if (gameOverTimer > 70) {
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#CCC';
    ctx.font = '16px sans-serif';
    const blink = Math.floor(Date.now() / 500) % 2;
    if (blink) {
      ctx.fillText('Enter\uB97C \uB20C\uB7EC \uC7AC\uC2DC\uC791', W / 2, cardY + cardH - 14);
    }

    // --- Bottom buttons (YouTube + Ranking) ---
    const btnW = 130, btnH = 32, gap = 12, radius = 6;
    const btnY = cardY + cardH + 12;
    const ytBtnX = W / 2 - gap / 2 - btnW;
    const rkBtnX = W / 2 + gap / 2;

    // YouTube button
    ctx.fillStyle = '#FF0000';
    ctx.beginPath();
    ctx.moveTo(ytBtnX + radius, btnY);
    ctx.lineTo(ytBtnX + btnW - radius, btnY);
    ctx.quadraticCurveTo(ytBtnX + btnW, btnY, ytBtnX + btnW, btnY + radius);
    ctx.lineTo(ytBtnX + btnW, btnY + btnH - radius);
    ctx.quadraticCurveTo(ytBtnX + btnW, btnY + btnH, ytBtnX + btnW - radius, btnY + btnH);
    ctx.lineTo(ytBtnX + radius, btnY + btnH);
    ctx.quadraticCurveTo(ytBtnX, btnY + btnH, ytBtnX, btnY + btnH - radius);
    ctx.lineTo(ytBtnX, btnY + radius);
    ctx.quadraticCurveTo(ytBtnX, btnY, ytBtnX + radius, btnY);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText('\u25B6 YouTube', ytBtnX + btnW / 2, btnY + btnH / 2 + 5);

    // Save button
    ctx.fillStyle = '#4a90d9';
    ctx.beginPath();
    ctx.moveTo(rkBtnX + radius, btnY);
    ctx.lineTo(rkBtnX + btnW - radius, btnY);
    ctx.quadraticCurveTo(rkBtnX + btnW, btnY, rkBtnX + btnW, btnY + radius);
    ctx.lineTo(rkBtnX + btnW, btnY + btnH - radius);
    ctx.quadraticCurveTo(rkBtnX + btnW, btnY + btnH, rkBtnX + btnW - radius, btnY + btnH);
    ctx.lineTo(rkBtnX + radius, btnY + btnH);
    ctx.quadraticCurveTo(rkBtnX, btnY + btnH, rkBtnX, btnY + btnH - radius);
    ctx.lineTo(rkBtnX, btnY + radius);
    ctx.quadraticCurveTo(rkBtnX, btnY, rkBtnX + radius, btnY);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText('\uD83D\uDCBE \uC800\uC7A5\uD558\uAE30', rkBtnX + btnW / 2, btnY + btnH / 2 + 5);
  }

  // --- Save notification ---
  if (saveNotifyTimer > 0) {
    saveNotifyTimer--;
    const nAlpha = saveNotifyTimer > 90 ? 1 : saveNotifyTimer / 90;
    const nY = cardY - 30 - (1 - Math.min(1, (120 - saveNotifyTimer) / 10)) * 15;
    ctx.globalAlpha = nAlpha;
    ctx.fillStyle = 'rgba(40, 40, 40, 0.85)';
    const nW = 200, nH = 30, nR = 8;
    const nX = W / 2 - nW / 2;
    ctx.beginPath();
    ctx.moveTo(nX + nR, nY);
    ctx.lineTo(nX + nW - nR, nY);
    ctx.quadraticCurveTo(nX + nW, nY, nX + nW, nY + nR);
    ctx.lineTo(nX + nW, nY + nH - nR);
    ctx.quadraticCurveTo(nX + nW, nY + nH, nX + nW - nR, nY + nH);
    ctx.lineTo(nX + nR, nY + nH);
    ctx.quadraticCurveTo(nX, nY + nH, nX, nY + nH - nR);
    ctx.lineTo(nX, nY + nR);
    ctx.quadraticCurveTo(nX, nY, nX + nR, nY);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#4CAF50';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('\u2705 \uC800\uC7A5\uB418\uC5C8\uC2B5\uB2C8\uB2E4!', W / 2, nY + nH / 2 + 5);
  }

  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (gameState === STATE.START) {
    drawStartScreen();
    return;
  }

  if (gameState === STATE.SELECT) {
    drawSelectScreen();
    return;
  }

  // Screen shake
  if (shakeTimer > 0) {
    ctx.save();
    const sx = (Math.random() - 0.5) * shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  drawBackground();
  drawCoins();
  drawItems();
  drawPlayer();
  drawObstacles();
  drawParticles();
  drawFloatingTexts();
  drawHUD();

  if (shakeTimer > 0) {
    ctx.restore();
  }

  // Blackout flicker when HP <= 40  (정전 연출)
  if (gameState === STATE.PLAYING && hp <= 30 && hp > 0) {
    const cycle = frameCount % 180; // 3-second loop
    // Phase: 0~29 = blackout sequence
    if (cycle < 30) {
      const t = cycle;
      let alpha = 0;
      let flash = false;
      let shake = 0;

      // 0-2: warning flickers (형광등 깜빡)
      if (t < 3) {
        alpha = (t % 2 === 0) ? 0.5 : 0;
        shake = 3;
      }
      // 3-4: brief recovery
      else if (t < 5) { alpha = 0; }
      // 5-7: harder flickers
      else if (t < 8) {
        alpha = (t % 2 === 0) ? 0.7 : 0.15;
        shake = 5;
      }
      // 8: white flash (전압 스파크)
      else if (t < 9) { flash = true; shake = 8; }
      // 9-17: full blackout
      else if (t < 18) {
        alpha = 0.92;
        shake = (t === 9) ? 10 : 2;
      }
      // 18-20: struggling recovery flickers
      else if (t < 21) {
        alpha = (t % 2 === 0) ? 0.8 : 0.2;
        shake = 4;
      }
      // 21-24: fade back
      else if (t < 25) {
        alpha = 0.7 * (1 - (t - 21) / 4);
      }
      // 25-27: one last flicker
      else if (t < 28) {
        alpha = (t === 26) ? 0.4 : 0;
        shake = (t === 26) ? 3 : 0;
      }
      // 28-29: done
      else { alpha = 0; }

      // Screen shake
      if (shake > 0) {
        ctx.save();
        ctx.translate(
          (Math.random() - 0.5) * shake * 2,
          (Math.random() - 0.5) * shake * 2
        );
      }

      // White flash overlay
      if (flash) {
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillRect(0, 0, W, H);
      }

      // Black overlay
      if (alpha > 0) {
        ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
        ctx.fillRect(0, 0, W, H);

        // Scanline noise during heavy blackout
        if (alpha > 0.5) {
          for (let sy = 0; sy < H; sy += 4) {
            if (Math.random() < 0.3) {
              ctx.fillStyle = 'rgba(255,255,255,' + (Math.random() * 0.06) + ')';
              ctx.fillRect(0, sy, W, 2);
            }
          }
        }
      }

      if (shake > 0) {
        ctx.restore();
      }
    }
  }

  // Pause overlay
  if (isPaused && gameState === STATE.PLAYING) {
    const NF = "'Noto Sans KR', sans-serif";
    // Semi-transparent backdrop
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.fillStyle = '#fff';
    ctx.font = '900 36px ' + NF;
    ctx.textAlign = 'center';
    ctx.fillText('\uC77C\uC2DC\uC815\uC9C0', W / 2, H / 2 - 50);

    // Buttons
    const btnW = 180, btnH = 44, btnGap = 16;
    const btnX = W / 2 - btnW / 2;
    const resumeBtnY = H / 2 - 5;
    const selectBtnY = resumeBtnY + btnH + btnGap;

    // Resume button
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath();
    ctx.roundRect(btnX, resumeBtnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '700 18px ' + NF;
    ctx.fillText('\uB2E4\uC2DC \uC2DC\uC791', W / 2, resumeBtnY + btnH / 2 + 6);

    // Character select button
    ctx.fillStyle = '#E94560';
    ctx.beginPath();
    ctx.roundRect(btnX, selectBtnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '700 18px ' + NF;
    ctx.fillText('\uCE90\uB9AD\uD130 \uC120\uD0DD', W / 2, selectBtnY + btnH / 2 + 6);
  }

  if (gameState === STATE.GAME_OVER) {
    drawGameOver();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
