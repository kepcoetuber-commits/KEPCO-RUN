};
let spritesLoaded = 0;
let spritesTotal = 0;

function loadFrames(charFrames, category, dir, files) {
  for (const f of files) {
    spritesTotal++;
    const img = new Image();
    img.onload = function() {
      if (this._loaded) return;
      this._loaded = true;
      spritesLoaded++;
      // data URL로 교체 → 캔버스 taint 방지
      try {
        const tc = document.createElement('canvas');
        tc.width = this.naturalWidth;
        tc.height = this.naturalHeight;
        tc.getContext('2d').drawImage(this, 0, 0);
        this.src = tc.toDataURL('image/png');
      } catch(e) { /* file:// 환경에서는 원본 유지 */ }
    };
    img.src = dir + f;
    charFrames[category].push(img);
  }
}

// Color interpolation for smooth theme transitions
function parseColor(c) {
  if (c.startsWith('#')) {
    const h = c.slice(1);
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16), 1];
  }
  const m = c.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*([\d.]+))?\s*\)/);
  return [+m[1], +m[2], +m[3], m[4] !== undefined ? +m[4] : 1];
}
function lerpColor(c1, c2, t) {
  const [r1,g1,b1,a1] = parseColor(c1);
  const [r2,g2,b2,a2] = parseColor(c2);
  return `rgba(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)},${(a1+(a2-a1)*t).toFixed(2)})`;
}
function getTheme() {
  const idx = Math.floor(score / 1000) % THEMES.length;
  const progress = (score % 1000) / 1000;
  if (progress > 0.8) {
    const next = (idx + 1) % THEMES.length;
    const t = (progress - 0.8) / 0.2;
    const a = THEMES[idx], b = THEMES[next];
    return { sky1: lerpColor(a.sky1, b.sky1, t), sky2: lerpColor(a.sky2, b.sky2, t), ground: lerpColor(a.ground, b.ground, t), road: lerpColor(a.road, b.road, t), cloud: lerpColor(a.cloud, b.cloud, t) };
  }
  return THEMES[idx];
}

// Clouds
let clouds = [];

  for (let i = 0; i < 5; i++) {
    clouds.push({

  hp = MAX_HP;
  player.y = GROUND_Y - PLAYER_SIZE;
  player.vy = 0;
  player.jumpsLeft = 2;
  player.onGround = true;
  obstacles = [];
  particles = [];
  coins = [];
  coinTimer = 0;
  coinGuides = [];
  floatingTexts = [];
  items = [];
  giantMode = false;
  giantTimer = 0;
  magnetMode = false;
  magnetTimer = 0;
  nextItemSpawn = 800;
  itemSpawnTimer = 0;
  shakeTimer = 0;
  shakeIntensity = 0;
  invincible = false;
  invincibleTimer = 0;
  pits = [];

  const groundCoinY = GROUND_Y - PLAYER_SIZE / 2 - COIN_SIZE / 2;
  const coinSpacing = COIN_GAP * baseSpeed;
  for (let x = PLAYER_X; x <= getSpawnX(); x += coinSpacing) {
    coins.push({ x, y: groundCoinY, w: COIN_SIZE, h: COIN_SIZE });
  }
  score = 0;
  bonusScore = 0;
  spawnTimer = 0;
  spawnInterval = 120;

function triggerGameOver() {
  gameState = STATE.GAME_OVER;
  gameOverTimer = 0;
  shakeTimer = 0;
  deathVY = -10;
  deathRotation = 0;
  deathY = player.y;
  deathX = player.x;
  if (score > highScore) {
    highScore = score;
    if (window.scoreAPI) window.scoreAPI.save(highScore);
    else localStorage.setItem('kepcoRunHighScore', highScore);
  }
}

function jump() {
  if (gameState === STATE.PLAYING && player.jumpsLeft > 0) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.jumpsLeft--;
  }
}

function startEditingName() {
  isEditingName = true;
  nicknameInput.value = '';
  nicknameInput.style.pointerEvents = 'auto';
  nicknameInput.focus();
}

function confirmName() {
  const name = nicknameInput.value.trim();
  if (name.length > 0) {
    playerName = name;
    localStorage.setItem('kepcoRunPlayerName', playerName);
  }
  isEditingName = false;
  nicknameInput.style.pointerEvents = 'none';
  nicknameInput.blur();
}

function cancelEditName() {
  isEditingName = false;
  nicknameInput.value = playerName;
  nicknameInput.style.pointerEvents = 'none';
  nicknameInput.blur();
}

// Hidden input event: sync value to canvas rendering
nicknameInput.addEventListener('input', () => {
  // Value is auto-synced; canvas reads nicknameInput.value each frame
});

function handleStartClick(e) {
  if (gameState !== STATE.START) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // Confirm modal takes priority
  if (showConfirmModal) {
    const modalW = 360, modalH = 140;
    const modalX = (W - modalW) / 2, modalY = (H - modalH) / 2;
    const btnW = 80, btnH = 30;
    const btnY = modalY + modalH - 45;
    const confirmBtnX = W / 2 - btnW - 10;
    const cancelBtnX = W / 2 + 10;
    // Confirm button
    if (mx >= confirmBtnX && mx <= confirmBtnX + btnW && my >= btnY && my <= btnY + btnH) {
      showConfirmModal = false;
      if (highScore > 0) {
        highScore = 0;
        if (window.scoreAPI) window.scoreAPI.save(0);
        else localStorage.setItem('kepcoRunHighScore', '0');
      }
      startEditingName();
      return;
    }
    // Cancel button
    if (mx >= cancelBtnX && mx <= cancelBtnX + btnW && my >= btnY && my <= btnY + btnH) {
      showConfirmModal = false;
      return;
    }
    return; // click outside modal buttons does nothing
  }

  if (startTab === 'guide') {
    // Back button
    const backBtnX = 15, backBtnY = 15, backBtnW = 120, backBtnH = 32;
    if (mx >= backBtnX && mx <= backBtnX + backBtnW && my >= backBtnY && my <= backBtnY + backBtnH) {
      startTab = 'main';
    }
    return;
  }

  // Guide button (upper left)
  const guideBtnW = 120, guideBtnH = 34;
  const guideBtnX = 15;
  const guideBtnY = 15;
  if (mx >= guideBtnX && mx <= guideBtnX + guideBtnW && my >= guideBtnY && my <= guideBtnY + guideBtnH) {
    startTab = 'guide';
    return;
  }

  // Nickname area
  const nameAreaY = H / 2 + 30;
  const nameBoxW = 220, nameBoxH = 30;
  const nameBoxX = W / 2 - nameBoxW / 2;
  const nameBoxY = nameAreaY - nameBoxH / 2;

  // Pencil edit button (when name exists, not editing)
  if (playerName && !isEditingName && ctx._pencilBtn) {
    const pb = ctx._pencilBtn;
    if (mx >= pb.x && mx <= pb.x + pb.w && my >= pb.y && my <= pb.y + pb.h) {
      showConfirmModal = true;
      return;
    }
  }

  // Nickname input box click (when no name or editing)
  if (!playerName || isEditingName) {
    if (mx >= nameBoxX && mx <= nameBoxX + nameBoxW && my >= nameBoxY && my <= nameBoxY + nameBoxH) {
      if (!isEditingName) startEditingName();
      return;
    }
  }

  // If editing name, clicking outside the box confirms
  if (isEditingName) {
    confirmName();
    return;
  }

  // High score reset button
  if (highScore > 0) {
    ctx.font = '400 13px sans-serif';
    const scoreW = ctx.measureText('Best: ' + highScore).width;
    const resetBtnW = 46, resetBtnH = 18;
    const resetBtnX = W / 2 + scoreW / 2 + 8;
    const scoreY = H / 2 + 82;
    const resetBtnY = scoreY - resetBtnH / 2 - 4;
    if (mx >= resetBtnX && mx <= resetBtnX + resetBtnW && my >= resetBtnY && my <= resetBtnY + resetBtnH) {
      highScore = 0;
      if (window.scoreAPI) window.scoreAPI.save(0);
      else localStorage.setItem('kepcoRunHighScore', '0');
      return;
    }
  }

  // Block game start if no nickname
  if (!playerName) return;

  // Anywhere else → proceed
  gameState = STATE.SELECT;
  startTab = 'main';
}

function handleInput(e) {
  if (gameState === STATE.START) {
    e.preventDefault();
    if (isEditingName || showConfirmModal) return;
    if (startTab === 'guide') {
      startTab = 'main';
      return;
    }
    if (!playerName) return; // block start without nickname
    gameState = STATE.SELECT;
    startTab = 'main';
    return;
  }
  if (gameState === STATE.GAME_OVER) {
    if (gameOverTimer < 70) return; // wait for animation
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const cx = ((e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0)) - rect.left) * scaleX;
    const cy = ((e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0)) - rect.top) * scaleY;
    const cardH = 280;
    const cardY = (H - cardH) / 2;
    const btnW = 130, btnH = 32, gap = 12;
    const btnY = cardY + cardH + 12;
    const ytBtnX = W / 2 - gap / 2 - btnW;
    const rkBtnX = W / 2 + gap / 2;
    if (cx >= ytBtnX && cx <= ytBtnX + btnW && cy >= btnY && cy <= btnY + btnH) {
      window.open('https://youtube.com/@kepconewmedia?si=c6jPXv8SpLwSJT40', '_blank');
      return;
    }
    if (cx >= rkBtnX && cx <= rkBtnX + btnW && cy >= btnY && cy <= btnY + btnH) {
      downloadGameOverCard();
      return;
    }
    gameState = STATE.SELECT;
    return;
  }
  if (gameState === STATE.PLAYING) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const cx = ((e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0)) - rect.left) * scaleX;
    const cy = ((e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0)) - rect.top) * scaleY;

    if (isPaused) {
      // Check overlay buttons
      const btnW = 180, btnH = 44, btnGap = 16;
      const btnX = W / 2 - btnW / 2;
      const resumeBtnY = H / 2 - 5;
      const selectBtnY = resumeBtnY + btnH + btnGap;

      if (cx >= btnX && cx <= btnX + btnW && cy >= resumeBtnY && cy <= resumeBtnY + btnH) {
        isPaused = false;
      } else if (cx >= btnX && cx <= btnX + btnW && cy >= selectBtnY && cy <= selectBtnY + btnH) {
        isPaused = false;
        gameState = STATE.SELECT;
          }
      return;
    }

    // Check pause button hit
    if (cx >= pauseBtnRect.x && cx <= pauseBtnRect.x + pauseBtnRect.w && cy >= pauseBtnRect.y && cy <= pauseBtnRect.y + pauseBtnRect.h) {
      isPaused = true;
      return;
    }

    jump();
  }
}

// Character selection click
function handleSelectClick(e) {
  if (gameState !== STATE.SELECT) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // Back to start button (upper left)
  const backBtnW = 120, backBtnH = 34;
  const backBtnX = 15, backBtnY = 15;
  if (mx >= backBtnX && mx <= backBtnX + backBtnW && my >= backBtnY && my <= backBtnY + backBtnH) {
    gameState = STATE.START;
    startTab = 'main';
    return;
  }

  const boxW = 130, boxH = 160, gap = 25;
  const totalW = CHARACTERS.length * boxW + (CHARACTERS.length - 1) * gap;
  const startX = (W - totalW) / 2;
  const boxY = 150;

  for (let i = 0; i < CHARACTERS.length; i++) {
    const bx = startX + i * (boxW + gap);
    if (mx >= bx && mx <= bx + boxW && my >= boxY && my <= boxY + boxH) {
      selectedChar = i;
      resetGame();
      gameState = STATE.PLAYING;
      return;
    }
  }
}

    if (e.code === 'Enter') {
      e.preventDefault();
      confirmName();
    } else if (e.code === 'Escape') {
      e.preventDefault();
      cancelEditName();
    }
    // All other keys go to the hidden input naturally
    return;
  }
  // Confirm modal: Enter=confirm, Esc=cancel
  if (gameState === STATE.START && showConfirmModal) {
    if (e.code === 'Enter') {
      e.preventDefault();
      showConfirmModal = false;
      if (highScore > 0) {
        highScore = 0;
        if (window.scoreAPI) window.scoreAPI.save(0);
        else localStorage.setItem('kepcoRunHighScore', '0');
      }
      startEditingName();
    } else if (e.code === 'Escape') {
      e.preventDefault();
      showConfirmModal = false;
    }
    return;
  }
  // Pause toggle (Escape/P) during PLAYING
  if (gameState === STATE.PLAYING && (e.code === 'Escape' || e.code === 'KeyP')) {
    e.preventDefault();
    isPaused = !isPaused;
    return;
  }
  // Block Space while paused
  if (gameState === STATE.PLAYING && isPaused && e.code === 'Space') {
    e.preventDefault();
    return;
  }
  if (e.code === 'Space') {
    handleInput(e);
    return;
  }
  if (gameState === STATE.START && startTab === 'guide') {
    if (e.code === 'Escape' || e.code === 'Backspace') {
      startTab = 'main';
    }
    return;
  }
  if (gameState === STATE.GAME_OVER && e.code === 'Enter') {
    if (gameOverTimer < 70) return;
    gameState = STATE.SELECT;
    return;
  }
  if (gameState === STATE.SELECT) {
    if (e.code === 'Escape' || e.code === 'Backspace') {
      gameState = STATE.START;
      startTab = 'main';
    } else if (e.code === 'ArrowLeft') {
      selectedChar = (selectedChar + CHARACTERS.length - 1) % CHARACTERS.length;
    } else if (e.code === 'ArrowRight') {
      selectedChar = (selectedChar + 1) % CHARACTERS.length;
    } else if (e.code === 'Enter') {
      resetGame();
      gameState = STATE.PLAYING;
    } else if (e.code === 'Digit1') { selectedChar = 0; resetGame(); gameState = STATE.PLAYING; }
    else if (e.code === 'Digit2') { selectedChar = 1; resetGame(); gameState = STATE.PLAYING; }
  }
});
let suppressNextClick = false;
canvas.addEventListener('touchend', (e) => {
  // Prevent iOS from seeing touchend on the canvas as "tap outside input" → keyboard dismiss
  if (suppressNextClick) {
    e.preventDefault();
    suppressNextClick = false;
  }
});
canvas.addEventListener('click', (e) => {
  if (suppressNextClick) { suppressNextClick = false; return; }
  if (gameState === STATE.START) {
    handleStartClick(e);
  } else if (gameState === STATE.SELECT) {
    handleSelectClick(e);
  } else {
    handleInput(e);
  }
});
canvas.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  // Safari blocks keyboard if preventDefault is called before focus().
  // Skip it when tapping the nickname input box so the keyboard shows up.
  const isNicknameTap = (() => {
    if (gameState !== STATE.START || playerName || isEditingName) return false;
    const rect = canvas.getBoundingClientRect();
    const mx = (touch.clientX - rect.left) * (W / rect.width);
    const my = (touch.clientY - rect.top) * (H / rect.height);
    const nameBoxW = 220, nameBoxH = 30;
    const nameBoxX = W / 2 - nameBoxW / 2;
    const nameBoxY = H / 2 + 30 - nameBoxH / 2;
    return mx >= nameBoxX && mx <= nameBoxX + nameBoxW && my >= nameBoxY && my <= nameBoxY + nameBoxH;
  })();
  if (!isNicknameTap) e.preventDefault();
  else suppressNextClick = true;
  if (gameState === STATE.START) {
    handleStartClick(touch);
  } else if (gameState === STATE.SELECT) {
    handleSelectClick(touch);
  } else {
    handleInput(e);
  }
});

function getSpawnX() {
  // Spawn far enough off-screen so coins settle before entering view
  const tPeak = -JUMP_FORCE / GRAVITY;
  return W + Math.ceil(tPeak * speed) + 80;
}

function spawnSingleObstacle(typeIndex, offsetX) {
  const type = OBSTACLE_TYPES[typeIndex];
  const sx = getSpawnX() + (offsetX || 0);
  obstacles.push({
    x: sx,
    y: GROUND_Y - type.h,
    w: type.w,
    h: type.h,
    color: type.color,
    triangle: type.triangle || false,
    windmill: type.windmill || false,
    solar: type.solar || false,
    ess: type.ess || false,
    name: type.name,
    damage: type.damage,
  });
  // Record for coin path — persists even if obstacle is destroyed
  coinGuides.push({
    x: sx,
    y: GROUND_Y - type.h,
    w: type.w,
    h: type.h,
  });
}

function spawnPit() {
  const sx = getSpawnX();
  const isDouble = score > 50 && Math.random() < 0.35;
  const w = isDouble ? PIT_WIDTH_DOUBLE : PIT_WIDTH_SINGLE;
  pits.push({ x: sx, w });
  lastSpawnWidth = w;
  // Coin guides so coins arc over the pit
  if (isDouble) {
    coinGuides.push({ x: sx + w * 0.25 - 10, y: GROUND_Y - 60, w: 20, h: 60 });
    coinGuides.push({ x: sx + w * 0.75 - 10, y: GROUND_Y - 60, w: 20, h: 60 });
  } else {
    coinGuides.push({ x: sx + w / 2 - 10, y: GROUND_Y - 60, w: 20, h: 60 });
  }
}

function isOverPit() {
  const cx = player.x + player.w / 2;
  for (const pit of pits) {
    if (cx > pit.x + 10 && cx < pit.x + pit.w - 10) return true;
  }
  return false;
}

function getSpawnPool() {
  if (score >= 1500) return TIER_POOLS[1];
  return TIER_POOLS[0];
}

function spawnObstacle() {
  // 15% chance to spawn a pit instead of an obstacle (from 1000+)
  if (score > 1000 && Math.random() < 0.15) {
    spawnPit();
    return;
  }
  // 30% chance to spawn a pattern, 70% single obstacle
  if (Math.random() < 0.3 && score > 20) {
    const pool = getSpawnPool();
    // Filter patterns to only use obstacles available in current pool
    const validPatterns = PATTERNS.filter(p => p.every(e => pool.includes(e.type)));
    if (validPatterns.length > 0) {
      const pattern = validPatterns[Math.floor(Math.random() * validPatterns.length)];
      let maxExtent = 0;
      for (const p of pattern) {
        spawnSingleObstacle(p.type, p.offsetX);
        const ext = p.offsetX + OBSTACLE_TYPES[p.type].w;
        if (ext > maxExtent) maxExtent = ext;
      }
      lastSpawnWidth = maxExtent;
      return;
    }
  }
  const pool = getSpawnPool();
  const idx = pool[Math.floor(Math.random() * pool.length)];
  spawnSingleObstacle(idx, 0);
  lastSpawnWidth = OBSTACLE_TYPES[idx].w;
}

function getCoinYForX(cx) {
  // Compute coin Y using actual jump physics (parabolic arc).
  // Uses coinGuides (not obstacles) so destroyed obstacles still shape the path.

  const groundPlayerY = GROUND_Y - PLAYER_SIZE;
  const groundCoinY = groundPlayerY + PLAYER_SIZE / 2 - COIN_SIZE / 2;

  const tPeak = -JUMP_FORCE / GRAVITY;
  const dxPeak = tPeak * speed;

  let bestY = groundCoinY;

  for (const guide of coinGuides) {
    const guideCenterX = guide.x + guide.w / 2;
    const jumpStartX = guideCenterX - dxPeak;
    const jumpEndX = guideCenterX + dxPeak;

    if (cx >= jumpStartX && cx <= jumpEndX) {
      const dx = cx - jumpStartX;
      const t = dx / speed;
      const playerTopY = groundPlayerY + JUMP_FORCE * t + 0.5 * GRAVITY * t * t;
      const coinY = playerTopY + PLAYER_SIZE / 2 - COIN_SIZE / 2;
      if (coinY < bestY) bestY = coinY;
    }
  }

  return bestY;
}

function rectCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  // Game over animation update
  if (gameState === STATE.GAME_OVER) {
    gameOverTimer++;
    deathVY += 0.5;
    deathY += deathVY;
    deathRotation += 0.15;
    return;
  }
  if (gameState !== STATE.PLAYING) return;
  if (isPaused) return;

  frameCount++;

  // Difficulty scaling
  speed = Math.min(25, baseSpeed + frameCount * 0.003);
  // Spawn interval: pixel-based clear gap that shrinks over time.
  // "Clear gap" = empty ground between end of prev hazard and start of next.
  const desiredClearGap = Math.max(400, 1000 - frameCount * 0.2);
  // Total spawn distance = clear gap + previous hazard's width
  spawnInterval = Math.max(20, Math.ceil((desiredClearGap + lastSpawnWidth) / speed));

  // Player physics
  player.vy += GRAVITY;
  player.y += player.vy;

  if (player.y >= GROUND_Y - PLAYER_SIZE) {
    if (fallingIntoPit) {
      // 이미 낭떠러지에 빠진 상태 — 절대 구출 안 됨
      player.onGround = false;
    } else if (isOverPit()) {
      // 낭떠러지 위에서 지면 높이 도달 → 추락 시작
      fallingIntoPit = true;
      player.onGround = false;
    } else {
      player.y = GROUND_Y - PLAYER_SIZE;
      player.vy = 0;
      player.onGround = true;
      player.jumpsLeft = 2;
    }
  }

  // Fall death (pit)
  if (player.y > H) {
    triggerGameOver();
  }

  // Giant mode timer
  if (giantMode) {
    giantTimer--;
    if (giantTimer <= 0) {
      giantMode = false;
      invincible = true;
      invincibleTimer = INVINCIBLE_DURATION;
    }
  }

  // Magnet mode timer
  if (magnetMode) {
    magnetTimer--;
    if (magnetTimer <= 0) {
      magnetMode = false;
    }
  }

  // Post-giant invincibility timer
  if (invincible) {
    invincibleTimer--;
    if (invincibleTimer <= 0) {
      invincible = false;
    }
  }

  // Screen shake timer
  if (shakeTimer > 0) shakeTimer--;

  // Update pits
  for (let i = pits.length - 1; i >= 0; i--) {
    pits[i].x -= speed;
    if (pits[i].x + pits[i].w < -50) {
      pits.splice(i, 1);
    }
  }

  // Spawn obstacles
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnObstacle();
    spawnTimer = 0;
  }

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= speed;
    if (obstacles[i].x + obstacles[i].w < 0) {
      obstacles.splice(i, 1);
      continue;
    }

    // Collision (shrink hitbox slightly for fairness)
    const shrinkX = obstacles[i].triangle ? 10 : 4;
    const hitbox = {
      x: obstacles[i].x + shrinkX,
      y: obstacles[i].y + 4,
      w: obstacles[i].w - shrinkX * 2,
      h: obstacles[i].h - 4,
    };
    // Giant mode: enlarged hitbox
    const pScale = giantMode ? GIANT_SCALE : 1;
    const pw = player.w * pScale;
    const ph = player.h * pScale;
    const px = player.x + (player.w - pw) / 2;
    const py = player.y + player.h - ph;
    const playerHitbox = {
      x: px + 12 * pScale,
      y: py + 8 * pScale,
      w: pw - 24 * pScale,
      h: ph - 12 * pScale,
    };
    if (rectCollision(playerHitbox, hitbox)) {
      if (giantMode) {
        // Destroy obstacle in giant mode
        for (let k = 0; k < 8; k++) {
          particles.push({
            x: obstacles[i].x + obstacles[i].w / 2,
            y: obstacles[i].y + obstacles[i].h / 2,
            vx: (Math.random() - 0.5) * 10,
            vy: -Math.random() * 8 - 2,
            size: 4 + Math.random() * 7,
            color: obstacles[i].color,
            life: 35,
          });
        }
        bonusScore += 10;
        floatingTexts.push({
          x: obstacles[i].x + obstacles[i].w / 2,
          y: obstacles[i].y,
          text: '+10', life: 40,
        });
        shakeTimer = 3;
        shakeIntensity = 4;
        obstacles.splice(i, 1);
      } else if (!invincible) {
        hp -= obstacles[i].damage;
        invincible = true;
        invincibleTimer = INVINCIBLE_DURATION;
        shakeTimer = 5;
        shakeIntensity = 6;
        floatingTexts.push({
          x: obstacles[i].x + obstacles[i].w / 2,
          y: obstacles[i].y,
          text: '-' + obstacles[i].damage, life: 40,
        });
        if (hp <= 0) {
          hp = 0;
          triggerGameOver();
        }
      }
    }
  }

  // Particle update
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Move coinGuides (in sync with obstacles, but never removed by destruction)
  for (let i = coinGuides.length - 1; i >= 0; i--) {
    coinGuides[i].x -= speed;
    if (coinGuides[i].x + coinGuides[i].w < -300) coinGuides.splice(i, 1);
  }

  // Coin spawn (continuous guide line) — spawned far off-screen
  coinTimer++;
  if (coinTimer >= COIN_GAP) {
    coinTimer = 0;
    const sx = getSpawnX();
    coins.push({
      x: sx,
      y: getCoinYForX(sx),
      w: COIN_SIZE, h: COIN_SIZE,
    });
  }

  // Coin update — adjust Y only while off-screen, freeze once visible
  const cScale = giantMode ? GIANT_SCALE : 1;
  const cpw = player.w * cScale;
  const cph = player.h * cScale;
  const cpx = player.x + (player.w - cpw) / 2;
  const cpy = player.y + player.h - cph;
  const playerHitboxCoin = {
    x: cpx + 8 * cScale, y: cpy + 4 * cScale,
    w: cpw - 16 * cScale, h: cph - 8 * cScale,
  };
  for (let i = coins.length - 1; i >= 0; i--) {
    coins[i].x -= speed;
    // Recalculate Y only while off-screen — once on screen, position is locked
    if (coins[i].x > W) {
      coins[i].y = getCoinYForX(coins[i].x);
    }
    if (coins[i].x + coins[i].w < 0) {
      coins.splice(i, 1);
      continue;
    }
    // Magnet attraction: pull on-screen coins toward the player
    if (magnetMode && coins[i].x <= W) {
      const coinCX = coins[i].x + coins[i].w / 2;
      const coinCY = coins[i].y + coins[i].h / 2;
      const playerCX = cpx + cpw / 2;
      const playerCY = cpy + cph / 2;
      const dx = playerCX - coinCX;
      const dy = playerCY - coinCY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MAGNET_RANGE && dist > 0) {
        coins[i].x += (dx / dist) * MAGNET_SPEED;
        coins[i].y += (dy / dist) * MAGNET_SPEED;
      }
    }
    if (rectCollision(playerHitboxCoin, coins[i])) {
      // Collect!
      bonusScore += 5;
      // Gold particles
      for (let k = 0; k < 3; k++) {
        particles.push({
          x: coins[i].x + 8, y: coins[i].y + 8,
          vx: (Math.random() - 0.5) * 4,
          vy: -Math.random() * 3 - 1,
          size: 2 + Math.random() * 3,
          color: '#FFD700',
          life: 20,
        });
      }
      // Floating text
      floatingTexts.push({
        x: coins[i].x + 8, y: coins[i].y,
        text: '+5', life: 40,
      });
      coins.splice(i, 1);
    }
  }

  // Item spawn
  itemSpawnTimer++;
  if (itemSpawnTimer >= nextItemSpawn) {
    itemSpawnTimer = 0;
    nextItemSpawn = ITEM_SPAWN_MIN + Math.floor(Math.random() * (ITEM_SPAWN_MAX - ITEM_SPAWN_MIN));
    const sx = getSpawnX();
    items.push({
      x: sx,
      y: getCoinYForX(sx),
      w: 28, h: 28,
      rotation: 0,
      type: Math.random() < 0.4 ? 'giant' : Math.random() < 0.5 ? 'magnet' : 'helmet',
    });
  }

  // Item update
  const pScaleItem = giantMode ? GIANT_SCALE : 1;
  const ipw = player.w * pScaleItem;
  const iph = player.h * pScaleItem;
  const ipx = player.x + (player.w - ipw) / 2;
  const ipy = player.y + player.h - iph;
  const playerHitboxItem = {
    x: ipx + 8 * pScaleItem,
    y: ipy + 4 * pScaleItem,
    w: ipw - 16 * pScaleItem,
    h: iph - 8 * pScaleItem,
  };
  for (let i = items.length - 1; i >= 0; i--) {
    items[i].x -= speed;
    items[i].rotation += 0.05;
    // Recalculate Y while off-screen
    if (items[i].x > W) {
      items[i].y = getCoinYForX(items[i].x);
    }
    if (items[i].x + items[i].w < 0) {
      items.splice(i, 1);
      continue;
    }
    if (rectCollision(playerHitboxItem, items[i])) {
      if (items[i].type === 'helmet') {
        hp = Math.min(MAX_HP, hp + 20);
        // Yellow/white particle burst
        for (let k = 0; k < 12; k++) {
          particles.push({
            x: items[i].x + 14, y: items[i].y + 14,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            size: 3 + Math.random() * 5,
            color: ['#FFD700', '#FFF176', '#FFFFFF', '#F9A825'][Math.floor(Math.random() * 4)],
            life: 30,
          });
        }
        floatingTexts.push({
          x: items[i].x + 14, y: items[i].y - 10,
          text: '+20 HP', life: 60,
        });
      } else if (items[i].type === 'magnet') {
        magnetMode = true;
        magnetTimer = MAGNET_DURATION;
        // Blue particle burst
        for (let k = 0; k < 12; k++) {
          particles.push({
            x: items[i].x + 14, y: items[i].y + 14,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            size: 3 + Math.random() * 5,
            color: ['#00BFFF', '#1E90FF', '#4169E1', '#00CED1'][Math.floor(Math.random() * 4)],
            life: 30,
          });
        }
        floatingTexts.push({
          x: items[i].x + 14, y: items[i].y - 10,
          text: 'MAGNET!', life: 60,
        });
      } else {
        giantMode = true;
        giantTimer = GIANT_DURATION;
        // Particle burst
        for (let k = 0; k < 12; k++) {
          particles.push({
            x: items[i].x + 14, y: items[i].y + 14,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            size: 3 + Math.random() * 5,
            color: ['#FFD700', '#FF4500', '#FFA500', '#FFFF00'][Math.floor(Math.random() * 4)],
            life: 30,
          });
        }
        floatingTexts.push({
          x: items[i].x + 14, y: items[i].y - 10,
          text: 'GIANT!', life: 60,
        });
      }
      items.splice(i, 1);
    }
  }

  // Floating text update
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y -= 1.5;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }

  // Score
  score = Math.floor(frameCount * 0.1) + bonusScore;

  // Clouds
  for (const cloud of clouds) {
    cloud.x -= cloud.speed;
    if (cloud.x + cloud.r < 0) {
      cloud.x = W + cloud.r;
      cloud.y = 30 + Math.random() * 80;
    }
  }

  // Road offset
  roadOffset = (roadOffset + speed) % 40;
}

function drawBackground() {
  const theme = getTheme();

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, theme.sky1);
  grad.addColorStop(1, theme.sky2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Clouds
  ctx.fillStyle = theme.cloud;
  for (const cloud of clouds) {
    ctx.beginPath();
    ctx.arc(cloud.x, cloud.y, cloud.r, 0, Math.PI * 2);
    ctx.arc(cloud.x + cloud.r * 0.8, cloud.y - cloud.r * 0.2, cloud.r * 0.7, 0, Math.PI * 2);
    ctx.arc(cloud.x - cloud.r * 0.6, cloud.y + cloud.r * 0.1, cloud.r * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = theme.ground;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Road dashes
  ctx.strokeStyle = theme.road;
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 20]);
  ctx.lineDashOffset = -roadOffset;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30);
  ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw pits (overdraw ground + dashes)
  for (const pit of pits) {
    if (pit.x >= W || pit.x + pit.w <= 0) continue;
    const left = Math.max(0, pit.x);
    const right = Math.min(W, pit.x + pit.w);
    const pw = right - left;
    const depth = H - GROUND_Y;
    const wallW = 16;

    // Deep abyss background — dark gradient for depth
    const abyssGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    abyssGrad.addColorStop(0, '#3a5a6a');
    abyssGrad.addColorStop(0.4, '#2a3a4a');
    abyssGrad.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = abyssGrad;
    ctx.fillRect(left, GROUND_Y, pw, depth);

    // Scattered rocks inside the pit
    ctx.fillStyle = '#3a3a3a';
    const pitMid = (left + right) / 2;
    ctx.beginPath();
    ctx.moveTo(pitMid - 12, H - 8);
    ctx.lineTo(pitMid - 5, H - 18);
    ctx.lineTo(pitMid + 3, H - 12);
    ctx.lineTo(pitMid + 8, H - 6);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.moveTo(pitMid + 15, H - 4);
    ctx.lineTo(pitMid + 22, H - 14);
    ctx.lineTo(pitMid + 30, H - 6);
    ctx.closePath();
    ctx.fill();

    // Depth fog (thicker, layered)
    const fogGrad = ctx.createLinearGradient(0, H - 30, 0, H);
    fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
    fogGrad.addColorStop(0.5, 'rgba(10,10,30,0.3)');
    fogGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
    ctx.fillStyle = fogGrad;
    ctx.fillRect(left, H - 30, pw, 30);

    // Horizontal depth lines (crevice feel)
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1;
    for (let dy = GROUND_Y + 10; dy < H - 15; dy += 12) {
      ctx.beginPath();
      ctx.moveTo(left + 5, dy);
      ctx.lineTo(right - 5, dy + 2);
      ctx.stroke();
    }

    // Helper: draw cliff wall
    function drawCliffWall(wx, isLeft) {
      // Asphalt cap
      ctx.fillStyle = '#606060';
      ctx.fillRect(wx, GROUND_Y, wallW, 5);
      // Asphalt detail lines
      ctx.strokeStyle = '#505050';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(wx + 2, GROUND_Y + 2);
      ctx.lineTo(wx + wallW - 2, GROUND_Y + 3);
      ctx.stroke();

      // Dirt/soil layer
      const dirtGrad = ctx.createLinearGradient(0, GROUND_Y + 5, 0, GROUND_Y + 20);
      dirtGrad.addColorStop(0, '#9B8342');
      dirtGrad.addColorStop(1, '#7A6828');
      ctx.fillStyle = dirtGrad;
      ctx.fillRect(wx, GROUND_Y + 5, wallW, 15);
      // Dirt texture dots
      ctx.fillStyle = '#B09848';
      const dotSeed = isLeft ? 0 : 5;
      ctx.fillRect(wx + 2 + dotSeed % 4, GROUND_Y + 7, 2, 2);
      ctx.fillRect(wx + 7 + dotSeed % 3, GROUND_Y + 11, 2, 2);
      ctx.fillRect(wx + 4 + dotSeed % 5, GROUND_Y + 15, 2, 2);
      ctx.fillStyle = '#6A5818';
      ctx.fillRect(wx + 10, GROUND_Y + 9, 2, 1);
      ctx.fillRect(wx + 3, GROUND_Y + 14, 1, 2);
      // Small root
      ctx.strokeStyle = '#5a4a20';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx + (isLeft ? wallW : 0), GROUND_Y + 10);
      ctx.quadraticCurveTo(wx + (isLeft ? wallW + 4 : -4), GROUND_Y + 15, wx + (isLeft ? wallW + 2 : -2), GROUND_Y + 18);
      ctx.stroke();

      // Rock layer (gradient)
      const rg = ctx.createLinearGradient(wx, 0, wx + wallW, 0);
      if (isLeft) {
        rg.addColorStop(0, '#5C4C3C');
        rg.addColorStop(1, '#7A6A58');
      } else {
        rg.addColorStop(0, '#7A6A58');
        rg.addColorStop(1, '#5C4C3C');
      }
      ctx.fillStyle = rg;
      ctx.fillRect(wx, GROUND_Y + 20, wallW, depth - 20);

      // Rock strata lines (varied spacing for realism)
      ctx.lineWidth = 1;
      const strataSpacings = [8, 11, 7, 10, 9, 12];
      let ly = GROUND_Y + 24;
      let si = 0;
      while (ly < H - 8) {
        ctx.strokeStyle = si % 2 === 0 ? '#4A3A2A' : '#5A4A38';
        ctx.beginPath();
        ctx.moveTo(wx + 1, ly);
        ctx.lineTo(wx + wallW - 1, ly + (isLeft ? 1 : -1));
        ctx.stroke();
        ly += strataSpacings[si % strataSpacings.length];
        si++;
      }

      // Embedded pebbles in rock
      ctx.fillStyle = '#6a5a4a';
      ctx.beginPath();
      ctx.arc(wx + 5, GROUND_Y + 30, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8a7a6a';
      ctx.beginPath();
      ctx.arc(wx + 10, GROUND_Y + 45, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5a4a3a';
      ctx.beginPath();
      ctx.arc(wx + 4, GROUND_Y + depth * 0.6, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Crumble overhang (jagged edge)
      ctx.fillStyle = '#706050';
      if (isLeft) {
        ctx.fillRect(wx + wallW, GROUND_Y, 6, 3);
        ctx.fillRect(wx + wallW + 1, GROUND_Y + 3, 4, 2);
        ctx.fillRect(wx + wallW + 3, GROUND_Y + 5, 2, 2);
        // Falling pebble dots
        ctx.fillStyle = '#8a7a5a';
        ctx.fillRect(wx + wallW + 5, GROUND_Y + 10, 2, 2);
        ctx.fillRect(wx + wallW + 3, GROUND_Y + 16, 1, 1);
      } else {
        ctx.fillRect(wx - 6, GROUND_Y, 6, 3);
        ctx.fillRect(wx - 5, GROUND_Y + 3, 4, 2);
        ctx.fillRect(wx - 3, GROUND_Y + 5, 2, 2);
        ctx.fillStyle = '#8a7a5a';
        ctx.fillRect(wx - 5, GROUND_Y + 10, 2, 2);
        ctx.fillRect(wx - 3, GROUND_Y + 16, 1, 1);
      }

      // Warning stripe + sign
      const signX = isLeft ? wx - 6 : wx + wallW + 2;
      ctx.fillStyle = '#E07020';
      ctx.fillRect(signX, GROUND_Y - 8, 4, 12);
      // Yellow/black caution stripe on ground edge
      ctx.fillStyle = '#FFD700';
      const edgeX = isLeft ? wx + wallW - 2 : wx;
      ctx.fillRect(edgeX, GROUND_Y - 2, 4, 2);
      ctx.fillStyle = '#333';
      ctx.fillRect(edgeX + 1, GROUND_Y - 2, 2, 1);
    }

    // Left cliff
    if (pit.x > 0) {
      drawCliffWall(left, true);
    }
    // Right cliff
    if (pit.x + pit.w < W) {
      drawCliffWall(right - wallW, false);
    }

    // Warning sign before pit (decorative only, no collision)
    if (pit.x > 20) {
      const signX = pit.x - 18;
      const signY = GROUND_Y - 28;
      // Post
      ctx.fillStyle = '#888';
      ctx.fillRect(signX + 5, signY + 16, 3, 12);
      // Sign board (yellow diamond)
      ctx.fillStyle = '#FFD700';
      ctx.save();
      ctx.translate(signX + 6, signY + 8);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-7, -7, 14, 14);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.strokeRect(-7, -7, 14, 14);
      ctx.restore();
      // Exclamation mark
      ctx.fillStyle = '#333';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('!', signX + 6, signY + 12);
    }
  }
}

// Per-character draw configs: [offX, offY, drawW, drawH] relative to player
// drawH controls sprite height (extends upward from feet)
// offX shifts sprite horizontally (negative = left)
const DRAW_CONFIG = {
  powercat: {
    run:     { offX: -5, drawH: 68 },
    jump:    { offX: -4, drawH: 78 },
    damaged: { offX: -2, drawH: 66 },
  },
  daeri: {
    run:     { offX: -8, drawH: 68 },
    jump:    { offX: -6, drawH: 78 },
    damaged: { offX: -4, drawH: 70 },
  },
};

function drawPlayerSprite() {
  const F = getFrames();
  if (!F) return;
  const charType = CHARACTERS[selectedChar].type;
  const cfg = DRAW_CONFIG[charType];
  if (!cfg) return;

  animTimer++;
  if (animTimer >= ANIM_SPEED) {
    animTimer = 0;
    animFrame++;
  }

  let frames = F.run;
  let dc = cfg.run;
  if (gameState === STATE.GAME_OVER) { frames = F.damaged; animFrame = 0; dc = cfg.damaged; }
  else if (!player.onGround) { frames = F.jump; dc = cfg.jump; }

  const idx = animFrame % frames.length;
  const img = frames[idx];
  if (spritesLoaded >= spritesTotal && img && img.complete) {
    const aspect = img.naturalWidth / img.naturalHeight;
    const dh = dc.drawH;
    const dw = dh * aspect;

    // Bottom-align: sprite feet always at player bottom
    const dx = player.x + (player.w - dw) / 2 + (dc.offX || 0);
    const dy = player.y + player.h - dh;
    ctx.drawImage(img, dx, dy, dw, dh);
  } else {
    ctx.fillStyle = CHARACTERS[selectedChar].color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
  }
}


function drawPlayer() {
  if (gameState === STATE.GAME_OVER) {
    // Death animation: character flies up, rotates, and falls off screen
    ctx.save();
    const cx = deathX + player.w / 2;
    const cy = deathY + player.h / 2;
    ctx.translate(cx, cy);
    ctx.rotate(deathRotation);
    ctx.translate(-cx, -cy);
    // Temporarily override player position for sprite drawing
    const origY = player.y;
    player.y = deathY;
    drawPlayerSprite();
    player.y = origY;
    ctx.restore();
    return;
  }
  if (giantMode) {
    ctx.save();
    // Scale around player center-bottom
    const cx = player.x + player.w / 2;
    const bottom = player.y + player.h;
    ctx.translate(cx, bottom);
    ctx.scale(GIANT_SCALE, GIANT_SCALE);
    ctx.translate(-cx, -bottom);

    // Gold aura
    const auraPulse = 0.2 + Math.sin(frameCount * 0.15) * 0.1;
    ctx.fillStyle = `rgba(255, 215, 0, ${auraPulse})`;
    ctx.beginPath();
    ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w * 0.7, 0, Math.PI * 2);
    ctx.fill();

    drawPlayerSprite();
    ctx.restore();
  } else if (invincible) {
    // Blink: skip drawing every other 4 frames
    if (Math.floor(frameCount / 4) % 2 === 0) {
      drawPlayerSprite();
    }
  } else {
    drawPlayerSprite();
  }
}

function drawObstacles() {
  for (const obs of obstacles) {
    ctx.fillStyle = obs.color;

    if (obs.windmill) {
      // ── 풍력발전기 (Wind Turbine) ──
      const midX = obs.x + obs.w / 2;
      const towerW = 8;

      // Tower body — tapers toward top
      const topW = 5;
      ctx.fillStyle = '#e0e0e0';
      ctx.beginPath();
      ctx.moveTo(midX - topW / 2, obs.y + 18);
      ctx.lineTo(midX - towerW / 2, obs.y + obs.h);
      ctx.lineTo(midX + towerW / 2, obs.y + obs.h);
      ctx.lineTo(midX + topW / 2, obs.y + 18);
      ctx.closePath();
      ctx.fill();
      // Tower shading (left side darker)
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.beginPath();
      ctx.moveTo(midX - topW / 2, obs.y + 18);
      ctx.lineTo(midX - towerW / 2, obs.y + obs.h);
      ctx.lineTo(midX, obs.y + obs.h);
      ctx.lineTo(midX, obs.y + 18);
      ctx.closePath();
      ctx.fill();
      // Tower outline
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(midX - topW / 2, obs.y + 18);
      ctx.lineTo(midX - towerW / 2, obs.y + obs.h);
      ctx.moveTo(midX + topW / 2, obs.y + 18);
      ctx.lineTo(midX + towerW / 2, obs.y + obs.h);
      ctx.stroke();
      // Horizontal rings on tower
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      for (let ry = obs.y + 35; ry < obs.y + obs.h - 10; ry += 20) {
        const t = (ry - obs.y - 18) / (obs.h - 18);
        const hw = (topW + (towerW - topW) * t) / 2;
        ctx.beginPath();
        ctx.moveTo(midX - hw, ry);
        ctx.lineTo(midX + hw, ry);
        ctx.stroke();
      }

      // Nacelle (housing at top)
      const nacX = midX - 6;
      const nacY = obs.y + 12;
      const nacW = 14;
      const nacH = 8;
      ctx.fillStyle = '#d0d0d0';
      ctx.fillRect(nacX, nacY, nacW, nacH);
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 1;
      ctx.strokeRect(nacX, nacY, nacW, nacH);
      // Nacelle front (rounded nose)
      ctx.fillStyle = '#c8c8c8';
      ctx.beginPath();
      ctx.arc(nacX + nacW, nacY + nacH / 2, nacH / 2, -Math.PI / 2, Math.PI / 2);
      ctx.fill();
      ctx.strokeStyle = '#aaa';
      ctx.stroke();

      // Hub (center of blades)
      const hubX = midX + 1;
      const hubY = obs.y + 16;
      ctx.fillStyle = '#ccc';
      ctx.beginPath();
      ctx.arc(hubX, hubY, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Rotating blades (3 blades)
      const bladeLen = 38;
      const bladeW = 4;
      const rotation = frameCount * 0.04;
      ctx.save();
      ctx.translate(hubX, hubY);
      for (let b = 0; b < 3; b++) {
        const angle = rotation + (b * Math.PI * 2) / 3;
        ctx.save();
        ctx.rotate(angle);
        // Blade shape — tapered
        ctx.fillStyle = '#f0f0f0';
        ctx.beginPath();
        ctx.moveTo(0, -1.5);
        ctx.lineTo(bladeLen * 0.15, -bladeW / 2);
        ctx.lineTo(bladeLen, -1);
        ctx.lineTo(bladeLen, 1);
        ctx.lineTo(bladeLen * 0.15, bladeW / 2);
        ctx.lineTo(0, 1.5);
        ctx.closePath();
        ctx.fill();
        // Blade edge line
        ctx.strokeStyle = '#bbb';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        // Red tip
        ctx.fillStyle = '#cc3333';
        ctx.fillRect(bladeLen - 5, -1, 5, 2);
        ctx.restore();
      }
      ctx.restore();

      // Hub center dot
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.arc(hubX, hubY, 2, 0, Math.PI * 2);
      ctx.fill();

      // Foundation base
      ctx.fillStyle = '#999';
      ctx.fillRect(midX - towerW / 2 - 4, obs.y + obs.h - 4, towerW + 8, 5);
      ctx.fillStyle = '#888';
      ctx.fillRect(midX - towerW / 2 - 6, obs.y + obs.h, towerW + 12, 3);

    } else if (obs.solar) {
      // ── 태양광패널 (Solar Panel) ──
      const midX = obs.x + obs.w / 2;

      // Support pole (center)
      const poleW = 6;
      const poleH = obs.h * 0.55;
      ctx.fillStyle = '#888';
      ctx.fillRect(midX - poleW / 2, obs.y + obs.h - poleH, poleW, poleH);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.strokeRect(midX - poleW / 2, obs.y + obs.h - poleH, poleW, poleH);

      // Base plate
      ctx.fillStyle = '#777';
      ctx.fillRect(midX - 14, obs.y + obs.h - 3, 28, 4);

      // Angled bracket (connects pole to panel)
      const bracketTopY = obs.y + obs.h - poleH;
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(midX - 2, bracketTopY + 4);
      ctx.lineTo(midX - obs.w * 0.38, bracketTopY - 4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(midX + 2, bracketTopY + 4);
      ctx.lineTo(midX + obs.w * 0.38, bracketTopY - 4);
      ctx.stroke();

      // Panel (tilted rectangle — drawn as a parallelogram)
      const panelW = obs.w - 4;
      const panelH = obs.h * 0.38;
      const panelY = obs.y;
      const tilt = 6; // pixel offset for tilt effect
      ctx.fillStyle = '#1a3a6a';
      ctx.beginPath();
      ctx.moveTo(midX - panelW / 2 + tilt, panelY);
      ctx.lineTo(midX + panelW / 2 + tilt, panelY);
      ctx.lineTo(midX + panelW / 2, panelY + panelH);
      ctx.lineTo(midX - panelW / 2, panelY + panelH);
      ctx.closePath();
      ctx.fill();
      // Panel border
      ctx.strokeStyle = '#8aa';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Grid lines on panel (reflective cells)
      ctx.strokeStyle = '#2a5a9a';
      ctx.lineWidth = 0.8;
      // Horizontal
      for (let gy = 1; gy < 3; gy++) {
        const ratio = gy / 3;
        const ly = panelY + panelH * ratio;
        const lTilt = tilt * (1 - ratio);
        ctx.beginPath();
        ctx.moveTo(midX - panelW / 2 + lTilt, ly);
        ctx.lineTo(midX + panelW / 2 + lTilt, ly);
        ctx.stroke();
      }
      // Vertical
      for (let gx = 1; gx < 4; gx++) {
        const ratio = gx / 4;
        const lx = midX - panelW / 2 + panelW * ratio;
        ctx.beginPath();
        ctx.moveTo(lx + tilt, panelY);
        ctx.lineTo(lx, panelY + panelH);
        ctx.stroke();
      }

      // Shine highlight
      ctx.fillStyle = 'rgba(135,206,250,0.2)';
      ctx.beginPath();
      ctx.moveTo(midX - panelW / 2 + tilt + 3, panelY + 2);
      ctx.lineTo(midX - panelW / 2 + tilt + panelW * 0.35, panelY + 2);
      ctx.lineTo(midX - panelW / 2 + panelW * 0.3, panelY + panelH - 2);
      ctx.lineTo(midX - panelW / 2 + 2, panelY + panelH - 2);
      ctx.closePath();
      ctx.fill();

    } else if (obs.ess) {
      // ── ESS 컨테이너 (Energy Storage System) ──
      // Container body
      ctx.fillStyle = '#e0e0e0';
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 2;
      ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);

      // Corrugated wall ridges
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      for (let rx = obs.x + 6; rx < obs.x + obs.w - 4; rx += 5) {
        ctx.beginPath();
        ctx.moveTo(rx, obs.y + 2);
        ctx.lineTo(rx, obs.y + obs.h - 2);
        ctx.stroke();
      }

      // Door panel (right side)
      const doorW = obs.w * 0.25;
      const doorH = obs.h - 8;
      const doorX = obs.x + obs.w - doorW - 4;
      const doorY = obs.y + 4;
      ctx.fillStyle = '#d0d0d0';
      ctx.fillRect(doorX, doorY, doorW, doorH);
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 1;
      ctx.strokeRect(doorX, doorY, doorW, doorH);
      // Door handle
      ctx.fillStyle = '#888';
      ctx.fillRect(doorX + 2, doorY + doorH * 0.45, 3, 6);

      // Ventilation grille (left side)
      ctx.fillStyle = '#bbb';
      const ventX = obs.x + 5;
      const ventY = obs.y + 6;
      const ventW = 14;
      const ventH = 12;
      ctx.fillRect(ventX, ventY, ventW, ventH);
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 0.7;
      for (let vy = ventY + 2; vy < ventY + ventH; vy += 3) {
        ctx.beginPath();
        ctx.moveTo(ventX, vy);
        ctx.lineTo(ventX + ventW, vy);
        ctx.stroke();
      }

      // "ESS" label
      ctx.fillStyle = '#1a5276';
      ctx.font = 'bold ' + Math.max(10, obs.h * 0.28) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('ESS', obs.x + obs.w * 0.38, obs.y + obs.h * 0.65);

      // Base rail
      ctx.fillStyle = '#777';
      ctx.fillRect(obs.x - 2, obs.y + obs.h - 2, obs.w + 4, 3);

    } else if (obs.triangle) {
      // ── 송전탑 / 대형송전탑 ──
      // Lattice body (two legs)
      const midX = obs.x + obs.w / 2;
      const legW = obs.w * 0.12;
      // Left leg
      ctx.fillStyle = obs.color;
      ctx.beginPath();
      ctx.moveTo(midX - legW, obs.y + obs.h * 0.15);
      ctx.lineTo(obs.x, obs.y + obs.h);
      ctx.lineTo(obs.x + legW * 2, obs.y + obs.h);
      ctx.lineTo(midX - legW * 0.3, obs.y + obs.h * 0.15);
      ctx.closePath();
      ctx.fill();
      // Right leg
      ctx.beginPath();
      ctx.moveTo(midX + legW * 0.3, obs.y + obs.h * 0.15);
      ctx.lineTo(obs.x + obs.w - legW * 2, obs.y + obs.h);
      ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
      ctx.lineTo(midX + legW, obs.y + obs.h * 0.15);
      ctx.closePath();
      ctx.fill();
      // Top head section (wider cap)
      const headH = obs.h * 0.18;
      const headW = obs.w * 0.35;
      ctx.fillStyle = '#555';
      ctx.fillRect(midX - headW / 2, obs.y, headW, headH);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1;
      ctx.strokeRect(midX - headW / 2, obs.y, headW, headH);
      // Cross beams (horizontal lattice bars)
      ctx.strokeStyle = '#6a6a6a';
      ctx.lineWidth = 1.5;
      const beamCount = obs.h > 100 ? 7 : obs.h > 85 ? 5 : 3;
      for (let b = 1; b <= beamCount; b++) {
        const ratio = 0.2 + (b / (beamCount + 1)) * 0.75;
        const gy = obs.y + obs.h * ratio;
        // Width at this height (narrows toward top)
        const wAtH = obs.w * (1 - (1 - ratio) * 0.6);
        const lx = midX - wAtH / 2;
        const rx = midX + wAtH / 2;
        ctx.beginPath();
        ctx.moveTo(lx, gy);
        ctx.lineTo(rx, gy);
        ctx.stroke();
      }
      // X bracing between legs
      ctx.strokeStyle = '#5a5a5a';
      ctx.lineWidth = 1;
      const sections = obs.h > 100 ? 4 : obs.h > 85 ? 3 : 2;
      for (let s = 0; s < sections; s++) {
        const t1 = 0.3 + (s / sections) * 0.6;
        const t2 = 0.3 + ((s + 1) / sections) * 0.6;
        const y1 = obs.y + obs.h * t1;
        const y2 = obs.y + obs.h * t2;
        const w1 = obs.w * (1 - (1 - t1) * 0.6);
        const w2 = obs.w * (1 - (1 - t2) * 0.6);
        ctx.beginPath();
        ctx.moveTo(midX - w1 / 2, y1);
        ctx.lineTo(midX + w2 / 2, y2);
        ctx.moveTo(midX + w1 / 2, y1);
        ctx.lineTo(midX - w2 / 2, y2);
        ctx.stroke();
      }
      // Insulators (hanging from top arms)
      const armY = obs.y + headH;
      const armSpan = obs.w * 0.55;
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(midX - armSpan / 2, armY);
      ctx.lineTo(midX + armSpan / 2, armY);
      ctx.stroke();
      // Insulator discs (blue ceramic)
      ctx.fillStyle = '#4a90d9';
      const insulatorPositions = [-armSpan / 2, -armSpan / 4, armSpan / 4, armSpan / 2];
      for (const ip of insulatorPositions) {
        ctx.fillRect(midX + ip - 2, armY + 1, 4, 5);
        ctx.fillStyle = '#6ab0e9';
        ctx.fillRect(midX + ip - 1, armY + 2, 2, 2);
        ctx.fillStyle = '#4a90d9';
      }
      // Power lines (drooping wires from insulators)
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      for (const ip of [insulatorPositions[0], insulatorPositions[3]]) {
        ctx.beginPath();
        ctx.moveTo(midX + ip, armY + 6);
        ctx.quadraticCurveTo(midX + ip + (ip > 0 ? 15 : -15), armY + 20, midX + ip + (ip > 0 ? 30 : -30), armY + 10);
        ctx.stroke();
      }
      // Base plates (feet)
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(obs.x - 3, obs.y + obs.h - 4, legW * 2 + 6, 4);
      ctx.fillRect(obs.x + obs.w - legW * 2 - 3, obs.y + obs.h - 4, legW * 2 + 6, 4);

    } else {
      // 사각형 계열 — 공통 박스
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);

      if (obs.name === '저압 배전함' || obs.name === '지중 배전함') {
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1;
        if (obs.name === '지중 배전함') {
          ctx.strokeRect(obs.x + 4, obs.y + 4, obs.w / 2 - 6, obs.h - 8);
          ctx.strokeRect(obs.x + obs.w / 2 + 2, obs.y + 4, obs.w / 2 - 6, obs.h - 8);
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 12px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('\u26A1', obs.x + obs.w / 2, obs.y + obs.h / 2 + 4);
        } else {
          ctx.strokeRect(obs.x + 5, obs.y + 5, obs.w - 10, obs.h - 10);
        }
      }

      if (obs.name === '배전전주' || obs.name === '고압배전전주') {
        // ── 전봇대 디테일 ──
        // Wood grain texture (vertical lines)
        ctx.strokeStyle = '#9a8a6a';
        ctx.lineWidth = 0.5;
        for (let gx = obs.x + 3; gx < obs.x + obs.w - 2; gx += 4) {
          ctx.beginPath();
          ctx.moveTo(gx, obs.y + 2);
          ctx.lineTo(gx + 1, obs.y + obs.h - 2);
          ctx.stroke();
        }
        // Knot holes
        ctx.fillStyle = '#6a5a3a';
        ctx.beginPath();
        ctx.ellipse(obs.x + obs.w / 2, obs.y + obs.h * 0.4, 3, 2, 0, 0, Math.PI * 2);
        ctx.fill();
        if (obs.h > 70) {
          ctx.beginPath();
          ctx.ellipse(obs.x + obs.w / 2 - 1, obs.y + obs.h * 0.7, 2, 1.5, 0.3, 0, Math.PI * 2);
          ctx.fill();
        }
        // Metal band (around pole)
        ctx.fillStyle = '#888';
        ctx.fillRect(obs.x - 1, obs.y + obs.h * 0.3, obs.w + 2, 3);
        if (obs.h > 70) {
          ctx.fillRect(obs.x - 1, obs.y + obs.h * 0.6, obs.w + 2, 3);
        }
        // Top cap
        ctx.fillStyle = '#666';
        ctx.fillRect(obs.x - 2, obs.y - 3, obs.w + 4, 5);
        // Cross arm (main)
        ctx.fillStyle = '#7a7a7a';
        ctx.fillRect(obs.x - 14, obs.y + 4, obs.w + 28, 4);
        // Insulators on cross arm
        ctx.fillStyle = '#4a90d9';
        ctx.fillRect(obs.x - 12, obs.y + 0, 4, 6);
        ctx.fillRect(obs.x + obs.w + 8, obs.y + 0, 4, 6);
        // Insulator caps (white ceramic)
        ctx.fillStyle = '#c8d8e8';
        ctx.fillRect(obs.x - 13, obs.y - 1, 6, 2);
        ctx.fillRect(obs.x + obs.w + 7, obs.y - 1, 6, 2);
        // Wires hanging from insulators
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(obs.x - 10, obs.y + 6);
        ctx.quadraticCurveTo(obs.x - 25, obs.y + 18, obs.x - 35, obs.y + 12);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(obs.x + obs.w + 10, obs.y + 6);
        ctx.quadraticCurveTo(obs.x + obs.w + 25, obs.y + 18, obs.x + obs.w + 35, obs.y + 12);
        ctx.stroke();
        if (obs.name === '고압배전전주') {
          // Second cross arm (lower)
          ctx.fillStyle = '#7a7a7a';
          ctx.fillRect(obs.x - 11, obs.y + 22, obs.w + 22, 4);
          // Insulators
          ctx.fillStyle = '#4a90d9';
          ctx.fillRect(obs.x - 9, obs.y + 18, 4, 6);
          ctx.fillRect(obs.x + obs.w + 5, obs.y + 18, 4, 6);
          // Transformer box on pole
          ctx.fillStyle = '#5a5a5a';
          ctx.fillRect(obs.x - 4, obs.y + obs.h * 0.45, obs.w + 8, 12);
          ctx.strokeStyle = '#444';
          ctx.lineWidth = 1;
          ctx.strokeRect(obs.x - 4, obs.y + obs.h * 0.45, obs.w + 8, 12);
        }
      }

      if (obs.name === '전력용 변압기') {
        ctx.fillStyle = '#3a6a3a';
        ctx.fillRect(obs.x + 4, obs.y + 4, obs.w - 8, obs.h * 0.4);
        ctx.strokeStyle = '#5a9a5a';
        ctx.lineWidth = 1;
        for (let ly = obs.y + obs.h * 0.5; ly < obs.y + obs.h - 4; ly += 6) {
          ctx.beginPath();
          ctx.moveTo(obs.x + 3, ly);
          ctx.lineTo(obs.x + obs.w - 3, ly);
          ctx.stroke();
        }
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(obs.x + 8, obs.y - 8, 5, 10);
        ctx.fillRect(obs.x + obs.w - 13, obs.y - 8, 5, 10);
      }

      // ── 건전지 (Battery) ──
      if (obs.name === '축전지') {
        // Battery body gradient
        const batGrad = ctx.createLinearGradient(obs.x, 0, obs.x + obs.w, 0);
        batGrad.addColorStop(0, '#3a3a3a');
        batGrad.addColorStop(0.4, '#555');
        batGrad.addColorStop(0.6, '#555');
        batGrad.addColorStop(1, '#2a2a2a');
        ctx.fillStyle = batGrad;
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        // Positive terminal (top nub)
        ctx.fillStyle = '#888';
        ctx.fillRect(obs.x + obs.w * 0.3, obs.y - 5, obs.w * 0.4, 6);
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.strokeRect(obs.x + obs.w * 0.3, obs.y - 5, obs.w * 0.4, 6);
        // Gold ring at top
        ctx.fillStyle = '#C8A832';
        ctx.fillRect(obs.x + 1, obs.y + 1, obs.w - 2, 4);
        // Label area (colored band)
        const labelY = obs.y + obs.h * 0.25;
        const labelH = obs.h * 0.45;
        ctx.fillStyle = '#D4371C';
        ctx.fillRect(obs.x + 2, labelY, obs.w - 4, labelH);
        // "+" symbol
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('+', obs.x + obs.w / 2, labelY + labelH * 0.4);
        // "-" at bottom
        ctx.fillStyle = '#999';
        ctx.font = 'bold 8px sans-serif';
        ctx.fillText('−', obs.x + obs.w / 2, obs.y + obs.h - 4);
        // Bottom metal plate
        ctx.fillStyle = '#777';
        ctx.fillRect(obs.x + 2, obs.y + obs.h - 3, obs.w - 4, 3);
        // Shine highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(obs.x + 2, obs.y + 2, obs.w * 0.3, obs.h - 6);
      }

      // ── 지상개폐기 (Ground Switchgear) ──
      if (obs.name === '지상 개폐기') {
        // Metal body gradient
        const sgGrad = ctx.createLinearGradient(0, obs.y, 0, obs.y + obs.h);
        sgGrad.addColorStop(0, '#6a7a6a');
        sgGrad.addColorStop(1, '#4a5a4a');
        ctx.fillStyle = sgGrad;
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        // Dark border
        ctx.strokeStyle = '#3a4a3a';
        ctx.lineWidth = 2;
        ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
        // Door panel (front face)
        ctx.strokeStyle = '#5a6a5a';
        ctx.lineWidth = 1;
        ctx.strokeRect(obs.x + 4, obs.y + 4, obs.w - 8, obs.h - 8);
        // Door handle
        ctx.fillStyle = '#888';
        ctx.fillRect(obs.x + obs.w - 10, obs.y + obs.h / 2 - 4, 4, 8);
        // Lock
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.arc(obs.x + obs.w - 8, obs.y + obs.h / 2 + 8, 2, 0, Math.PI * 2);
        ctx.fill();
        // Warning sticker (yellow triangle)
        const wx = obs.x + 10;
        const wy = obs.y + 8;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.moveTo(wx + 8, wy);
        ctx.lineTo(wx + 16, wy + 14);
        ctx.lineTo(wx, wy + 14);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Lightning bolt in warning
        ctx.fillStyle = '#333';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('\u26A1', wx + 8, wy + 12);
        // Ventilation slits
        ctx.strokeStyle = '#4a5a4a';
        ctx.lineWidth = 1;
        for (let sy = obs.y + obs.h - 14; sy < obs.y + obs.h - 4; sy += 4) {
          ctx.beginPath();
          ctx.moveTo(obs.x + 6, sy);
          ctx.lineTo(obs.x + 18, sy);
          ctx.stroke();
        }
        // Base plate (slightly wider)
        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(obs.x - 3, obs.y + obs.h - 3, obs.w + 6, 4);
        // Cable entry (side bumps)
        ctx.fillStyle = '#555';
        ctx.fillRect(obs.x - 4, obs.y + 6, 5, 6);
        ctx.fillRect(obs.x + obs.w - 1, obs.y + 6, 5, 6);
      }
    }

  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / 30;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.globalAlpha = 1;
  }
}

// Shared yellow safety helmet icon (노란 안전모 + 초록 십자)
function drawHelmetIcon(cx, cy, size) {
  const s = size / 20; // base unit scale
  // Helmet spans from -10s to +1s vertically; shift down by 4.5s to center
  const offy = 4.5 * s;
  ctx.save();
  ctx.translate(cx, cy + offy);

  // Dome (yellow)
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, -2 * s, 9 * s, 8 * s, 0, Math.PI, 0);
  ctx.fill();

  // Brim (darker yellow)
  ctx.fillStyle = '#E6B800';
  ctx.fillRect(-10 * s, -2 * s, 20 * s, 3 * s);

  // Dome highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.ellipse(-2 * s, -6 * s, 5 * s, 3 * s, -0.2, 0, Math.PI * 2);
  ctx.fill();

  // Green cross
  const cw = 2.5 * s;
  const ch = 7 * s;
  ctx.fillStyle = '#2E7D32';
  ctx.fillRect(-cw / 2, -8 * s, cw, ch);
  ctx.fillRect(-ch / 2, -5.5 * s, ch, cw);

  ctx.restore();
}

function drawItems() {
  for (const item of items) {
    const cx = item.x + item.w / 2;
    const cy = item.y + item.h / 2;
    const pulse = 1 + Math.sin(frameCount * 0.1) * 0.15;
    const r = (item.w / 2) * pulse;

    if (item.type === 'magnet') {
      // Magnet item — blue glow
      ctx.shadowColor = '#1E90FF';
      ctx.shadowBlur = 16;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(item.rotation);

      // Body - blue gradient
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
      const t = (Math.sin(frameCount * 0.08) + 1) / 2;
      grad.addColorStop(0, '#00FFFF');
      grad.addColorStop(0.5, t > 0.5 ? '#1E90FF' : '#00BFFF');
      grad.addColorStop(1, '#0040FF');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      // 'U' magnet icon
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('U', 0, 1);
      ctx.textBaseline = 'alphabetic';

      ctx.restore();

      // Edge glow ring — blue
      ctx.shadowBlur = 0;
      ctx.strokeStyle = `rgba(30, 144, 255, ${0.4 + pulse * 0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
      ctx.stroke();
    } else if (item.type === 'helmet') {
      // Helmet item — yellow glow + drawn helmet icon
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 16;

      // Background circle
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(item.rotation);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
      const t = (Math.sin(frameCount * 0.08) + 1) / 2;
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.5, t > 0.5 ? '#FFD700' : '#FFF176');
      grad.addColorStop(1, '#F9A825');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.shadowBlur = 0;
      drawHelmetIcon(cx, cy, r * 1.6);

      // Edge glow ring — yellow
      ctx.strokeStyle = `rgba(255, 215, 0, ${0.4 + pulse * 0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      // Giant item — red/gold glow (original)
      ctx.shadowColor = '#FF4500';
      ctx.shadowBlur = 16;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(item.rotation);

      // Body - red/gold gradient
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
      const t = (Math.sin(frameCount * 0.08) + 1) / 2;
      grad.addColorStop(0, '#FFFF00');
      grad.addColorStop(0.5, t > 0.5 ? '#FF4500' : '#FFD700');
      grad.addColorStop(1, '#FF2200');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      // Lightning bolt icon
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u26A1', 0, 1);
      ctx.textBaseline = 'alphabetic';

      ctx.restore();

      // Edge glow ring
      ctx.shadowBlur = 0;
      ctx.strokeStyle = `rgba(255, 200, 0, ${0.4 + pulse * 0.3})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.shadowBlur = 0;
}

function drawCoins() {
  for (const c of coins) {
    const pulse = 1 + Math.sin(frameCount * 0.15 + c.x * 0.05) * 0.12;
    const r = (c.w / 2) * pulse;
    const cx = c.x + c.w / 2;
    const cy = c.y + c.h / 2;

    // Glow
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 10;

    // Coin circle
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700';
    ctx.fill();
    ctx.strokeStyle = '#DAA520';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Inner ring
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.78, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(218,165,32,0.5)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Lightning bolt inside
    ctx.save();
    ctx.translate(cx, cy);
    const bs = r * 0.18;
    ctx.scale(bs, bs);
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.moveTo(1, -7);
    ctx.lineTo(-3, -0.5);
    ctx.lineTo(0, -0.5);
    ctx.lineTo(-2, 7);
    ctx.lineTo(4, 0.5);
    ctx.lineTo(1, 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const alpha = ft.life / 40;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  ctx.fillStyle = '#333';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('Score: ' + score, W - 20, 30);
  ctx.font = '14px monospace';
  ctx.fillText('Best: ' + highScore, W - 20, 50);
  if (playerName) {
    ctx.fillStyle = '#666';
    ctx.font = '12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(playerName, W - 20, 66);
  }

  // HP bar
  const hpIconSize = 18;
  const hpBarX = 15 + hpIconSize + 4;
  const hpBarY = 15;
  const hpBarW = 150;
  const hpBarH = 16;
  const hpRatio = hp / MAX_HP;

  // Helmet icon left of bar
  drawHelmetIcon(15 + hpIconSize / 2, hpBarY + hpBarH / 2, hpIconSize);

  // Background bar
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(hpBarX, hpBarY, hpBarW, hpBarH);

  // HP color: green → yellow → red
  let hpColor;
  if (hpRatio > 0.6) {
    hpColor = '#4CAF50';
  } else if (hpRatio > 0.3) {
    hpColor = '#FFC107';
  } else {
    hpColor = '#F44336';
  }

  // HP fill
  ctx.fillStyle = hpColor;
  ctx.fillRect(hpBarX, hpBarY, hpBarW * hpRatio, hpBarH);

  // Border
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeRect(hpBarX, hpBarY, hpBarW, hpBarH);

  // HP text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HP ' + hp + '/' + MAX_HP, hpBarX + hpBarW / 2, hpBarY + 12);

  // Pause button (left of score)
  ctx.font = 'bold 20px monospace';
  const pauseBtnW = 36, pauseBtnH = 28;
  const pauseBtnX = W - 20 - ctx.measureText('Score: ' + score).width - 10 - pauseBtnW;
  const pauseBtnY = 10;
  pauseBtnRect = { x: pauseBtnX, y: pauseBtnY, w: pauseBtnW, h: pauseBtnH };
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(pauseBtnX, pauseBtnY, pauseBtnW, pauseBtnH, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(pauseBtnX, pauseBtnY, pauseBtnW, pauseBtnH, 6);
  ctx.stroke();
  // "II" icon
  ctx.fillStyle = '#fff';
  const barW = 4, barH = 14;
  const barY = pauseBtnY + (pauseBtnH - barH) / 2;
  const barCX = pauseBtnX + pauseBtnW / 2;
  ctx.fillRect(barCX - barW - 2, barY, barW, barH);
  ctx.fillRect(barCX + 2, barY, barW, barH);
}

function drawStartScreen() {
  if (startTab === 'guide') {
    drawStartGuideScreen();
    return;
  }

  drawSelectBackground();

  const NF = "'Noto Sans KR', sans-serif";

  // Title
  ctx.fillStyle = '#E94560';
  ctx.font = '900 54px ' + NF;
  ctx.textAlign = 'center';
  ctx.fillText('KEPCO\uB7F0', W / 2, H / 2 - 65);

  // Intro line 1 — emphasis
  ctx.fillStyle = '#333';
  ctx.font = '700 15px ' + NF;
  ctx.fillText('\uC6B0\uB9AC\uAC00 \uB9E4\uC77C \uC0AC\uC6A9\uD558\uB294 \uC804\uAE30\uB294 \uC5B4\uB5A4 \uACFC\uC815\uC744 \uAC70\uCCD0 \uC6B0\uB9AC \uC9D1\uAE4C\uC9C0 \uC62C\uAE4C\uC694?', W / 2, H / 2 - 30);

  // Intro line 2, 3
  ctx.fillStyle = '#555';
  ctx.font = '300 13px ' + NF;
  ctx.fillText('\uC804\uB825\uC124\uBE44 \uB3C4\uAC10\uC744 \uD1B5\uD574 \uBC1C\uC804, \uC1A1\uC804, \uBC30\uC804 \uC124\uBE44\uB4E4\uC744 \uC27D\uACE0 \uC7AC\uBBF8\uC788\uAC8C \uC54C\uC544\uBCF4\uACE0,', W / 2, H / 2 - 6);
  ctx.fillText('KEPCO RUN \uAC8C\uC784\uC5D0\uC11C \uC9C1\uC811 \uC804\uB825\uB9DD\uC744 \uB2EC\uB9AC\uBA70 \uCD5C\uACE0 \uC810\uC218\uC5D0 \uB3C4\uC804\uD574\uBCF4\uC138\uC694!', W / 2, H / 2 + 10);

  // Nickname area
  const nameAreaY = H / 2 + 30;
  const nameBoxW = 220, nameBoxH = 30;
  const nameBoxX = W / 2 - nameBoxW / 2;
  const nameBoxY = nameAreaY - nameBoxH / 2;

  if (isEditingName) {
    // Editing mode: show input box with blinking cursor
    ctx.fillStyle = '#fff';
    ctx.fillRect(nameBoxX, nameBoxY, nameBoxW, nameBoxH);
    ctx.strokeStyle = '#E94560';
    ctx.lineWidth = 2;
    ctx.strokeRect(nameBoxX, nameBoxY, nameBoxW, nameBoxH);

    ctx.fillStyle = '#333';
    ctx.font = '400 15px ' + NF;
    ctx.textAlign = 'center';
    const displayText = nicknameInput.value;
    if (displayText.length > 0) {
      ctx.fillText(displayText, W / 2, nameAreaY + 5);
    } else {
      ctx.fillStyle = '#aaa';
      ctx.fillText('\uB2C9\uB124\uC784\uC744 \uC785\uB825\uD558\uC138\uC694', W / 2, nameAreaY + 5);
    }
    // Blinking cursor
    const cursorBlink = Math.floor(Date.now() / 500) % 2;
    if (cursorBlink) {
      ctx.font = '400 15px ' + NF;
      const textW = displayText.length > 0 ? ctx.measureText(displayText).width : 0;
      const cursorX = W / 2 + textW / 2 + 2;
      ctx.strokeStyle = '#E94560';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cursorX, nameBoxY + 5);
      ctx.lineTo(cursorX, nameBoxY + nameBoxH - 5);
      ctx.stroke();
    }
  } else if (playerName) {
    // Display mode: show player name + pencil edit button
    ctx.fillStyle = '#555';
    ctx.font = '400 14px ' + NF;
    ctx.textAlign = 'center';
    const nameText = '\uD50C\uB808\uC774\uC5B4: ' + playerName;
    ctx.fillText(nameText, W / 2, nameAreaY + 5);
    // Pencil edit button
    const nameTextW = ctx.measureText(nameText).width;
    const pencilX = W / 2 + nameTextW / 2 + 12;
    const pencilY = nameAreaY - 6;
    const pencilSize = 16;
    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#999';
    ctx.textAlign = 'center';
    ctx.fillText('\u270F\uFE0F', pencilX, pencilY + 12);
    // Store pencil hit area for click handling

function drawSelectBackground() {
  const theme = THEMES[0]; // Always use first theme (blue sky)

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, theme.sky1);
  grad.addColorStop(1, theme.sky2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Clouds
  ctx.fillStyle = theme.cloud;
  for (const cloud of clouds) {
    ctx.beginPath();
    ctx.arc(cloud.x, cloud.y, cloud.r, 0, Math.PI * 2);
    ctx.arc(cloud.x + cloud.r * 0.8, cloud.y - cloud.r * 0.2, cloud.r * 0.7, 0, Math.PI * 2);
    ctx.arc(cloud.x - cloud.r * 0.6, cloud.y + cloud.r * 0.1, cloud.r * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = theme.ground;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Road dashes
  ctx.strokeStyle = theme.road;
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 20]);
  ctx.lineDashOffset = -roadOffset;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30);
  ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawObstaclePreview(typeIndex, px, py, previewScale) {
  const type = OBSTACLE_TYPES[typeIndex];
  const fakeObs = {
    x: 0, y: 0, w: type.w, h: type.h,
    color: type.color,
    triangle: type.triangle || false,
    windmill: type.windmill || false,
    solar: type.solar || false,
    ess: type.ess || false,
    name: type.name,
  };
  ctx.save();
  // Position so bottom-center of scaled obstacle is at (px, py)
  ctx.translate(px, py);
  ctx.scale(previewScale, previewScale);
  ctx.translate(-type.w / 2, -type.h);
  const savedObs = obstacles;
  obstacles = [fakeObs];
  drawObstacles();
  obstacles = savedObs;
  ctx.restore();
}
